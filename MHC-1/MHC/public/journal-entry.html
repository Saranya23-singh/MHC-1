<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Entry - SootheSpace</title>
    <link rel="stylesheet" href="journal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .entry-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        
        .entry-card {
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(123, 174, 127, 0.15);
        }
        
        .entry-date {
            color: #7BAE7F;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 600;
        }
        
        .entry-text {
            color: #2F3E46;
            font-size: 1.1rem;
            line-height: 1.9;
            white-space: pre-wrap;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #2F6F57 0%, #3d8b6a 100%);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(47, 111, 87, 0.4);
        }
    </style>
</head>
<body>
    <!-- Floating gradient orbs -->
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>

    <a href="dashboard.html" class="home-btn"><i class="fas fa-home"></i> Home</a>
    
    <div class="entry-container">
        <a href="journal.html" class="back-btn" id="backButton">
            <i class="fas fa-arrow-left"></i> Back to Journal
        </a>
        
        <div class="entry-card">
            <div class="entry-date" id="entryDate">Loading...</div>
            <div class="entry-text" id="entryText">Loading entry...</div>
        </div>
    </div>

    <script src="journal.js"></script>
</body>
</html>
